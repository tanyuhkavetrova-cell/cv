Ниже пример простой «визитки» на HTML и CSS.

<!-- index.html -->
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Визитка</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="card">
    <div class="photo">
      <!-- Замените avatar.jpg на ваш файл или ссылку -->
      <img src="avatar.jpg" alt="">
    </div>
    <h1 class="name">Андрейченко Татьяна</h1>
    
    <section class="about">
      <h2>Обо мне</h2>
      <p>Я создаю современные и адаптивные сайты. Люблю чистый код и интересные проекты.</p>
    </section>

    <section class="contacts">
      <h2>Контакты</h2>
      <ul>
        <li>Телефон: <a href="tel:+79161294567">+7 (916) 123-45-67</a></li>
        <li>Сайт: <a href="https://example.com" target="_blank">example.com</a></li>
      </ul>
    </section>

    <footer class="social">
      <a href="#" title="Telegram">✈️</a>
      <a href="#" title="GitHub">🐙</a>
      <a href="#" title="LinkedIn">💼</a>
    </footer>
  </div>
</body>
</html>
